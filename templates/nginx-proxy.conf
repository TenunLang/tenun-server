# Referensi vhost reverse-proxy aaPanel (dihasilkan otomatis oleh `tenun-server new`).
# Lokasi: /www/server/panel/vhost/nginx/<domain>.conf
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;          # otomatis bila cert aaPanel ada
    listen [::]:443 ssl;
    http2 on;
    server_name DOMAIN;

    ssl_certificate     /www/server/panel/vhost/cert/DOMAIN/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/DOMAIN.conf;
    #CERT-APPLY-CHECK--END

    access_log /www/wwwlogs/DOMAIN.log;
    error_log  /www/wwwlogs/DOMAIN.error.log;
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:PORT;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;   # WebSocket upgrade + keep-alive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
